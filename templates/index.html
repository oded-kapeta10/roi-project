<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFulMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --user-bg: #dcf8c6; --agent-bg: #ffffff; --body-bg: #e5ddd5; }
        body { background-color: var(--body-bg); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 10px; position: relative; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-start; background-color: var(--user-bg); border-top-right-radius: 0; }
        .agent { align-self: flex-end; background-color: var(--agent-bg); border-top-left-radius: 0; }
        
        /* Input Area */
        .input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; align-items: center; }
        textarea { border-radius: 20px !important; resize: none; border: none; padding: 10px 15px !important; }
        
        /* Trace Area (Collapsible) */
        .trace-section { background: #fff; border-top: 1px solid #ccc; max-height: 250px; overflow-y: auto; display: none; }
        .step-card { border-right: 4px solid #007bff; margin: 10px; padding: 10px; background: #f8f9fa; font-size: 0.8rem; }
        pre { background: #2b2b2b; color: #fff; padding: 8px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="bg-primary text-white p-3 shadow-sm d-flex justify-content-between align-items-center">
        <h5 class="m-0">MindFulMate</h5>
        <button class="btn btn-outline-light btn-sm" onclick="toggleTrace()">הצג/הסתר Trace</button>
    </div>

    <div id="chat-window">
        <div class="message agent">Hi, how are you feeling today?</div>
    </div>

    <div id="trace-section" class="trace-section p-3">
        <h6>Execution Trace (לצורכי בדיקה):</h6>
        <div id="stepsContainer"></div>
    </div>

    <div class="input-area">
        <textarea class="form-control" id="userPrompt" rows="1" placeholder="הקלד/י הודעה..."></textarea>
        <button class="btn btn-success rounded-circle" id="runBtn" onclick="runAgent()" style="width: 50px; height: 50px;">➔</button>
    </div>

    <script>
        let chatHistory = [];

        function toggleTrace() {
            const ts = document.getElementById('trace-section');
            ts.style.display = (ts.style.display === 'none' || ts.style.display === '') ? 'block' : 'none';
        }

        async function runAgent() {
            const promptInput = document.getElementById('userPrompt');
            const prompt = promptInput.value.trim();
            const btn = document.getElementById('runBtn');
            const chatWindow = document.getElementById('chat-window');
            const stepsContainer = document.getElementById('stepsContainer');

            if (!prompt) return;

            // 1. הוספת הודעת משתמש למסך
            appendBubble('user', prompt);
            promptInput.value = '';
            btn.disabled = true;

            try {
                const response = await fetch('/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        history: chatHistory.concat([{ role: "user", content: prompt }])
                    })
                });

                const data = await response.json();

                if (data.status === 'ok') {
                    // 2. הוספת תשובת הסוכן למסך 
                    appendBubble('agent', data.response);
                    
                    // 3. עדכון היסטוריה
                    chatHistory.push({ role: "user", content: prompt });
                    chatHistory.push({ role: "assistant", content: data.response });

                    // 4. עדכון ה-Trace 
                    renderSteps(data.steps);
                }
            } catch (err) {
                appendBubble('agent', "מצטער, חלה שגיאה בחיבור.");
            } finally {
                btn.disabled = false;
            }
        }
                // מאזין למקלדת בתוך תיבת הטקסט
        document.getElementById('userPrompt').addEventListener('keydown', function(event) {
            // בודק אם לחצו על Enter
            if (event.key === 'Enter') {
                // אם Shift לא לחוץ - שלח הודעה ומנע ירידת שורה
                if (!event.shiftKey) {
                    event.preventDefault(); // מונע את ירידת השורה הדיפולטית
                    runAgent(); // קורא לפונקציה שכבר כתבנו
                }
                // אם Shift לחוץ - הוא פשוט ירד שורה כרגיל
            }
        });

        function appendBubble(role, text) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function renderSteps(steps) {
            const container = document.getElementById('stepsContainer');
            container.innerHTML = ''; // ניקוי צעדים קודמים
            steps.forEach(step => {
                const card = document.createElement('div');
                card.className = 'step-card shadow-sm';
                card.innerHTML = `
                    <strong>Module: ${step.module}</strong> [cite: 103]<br>
                    <small>Response:</small>
                    <pre>${typeof step.response === 'object' ? JSON.stringify(step.response, null, 2) : step.response}</pre>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
