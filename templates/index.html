<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFulMate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .message { 
            direction: ltr; 
            text-align: left; 
            word-break: break-all;
        }
            #userPrompt {
                text-align: left;
                direction: ltr;
        }
        .video-container {
            margin-top: 10px;
            width: 100%;
            max-width: 300px; 
            aspect-ratio: 16 / 9;
        }
        
        .video-container iframe {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
                
        /*    (Thinking Indicator) */
        .typing { display: flex; gap: 5px; padding: 10px; align-self: flex-end; background: var(--agent-bg); border-radius: 10px; border-top-left-radius: 0; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        :root { --user-bg: #dcf8c6; --agent-bg: #ffffff; --body-bg: #e5ddd5; }
        body { background-color: var(--body-bg); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 10px; position: relative; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-start; background-color: var(--user-bg); border-top-right-radius: 0; }
        .agent { align-self: flex-end; background-color: var(--agent-bg); border-top-left-radius: 0; }
        
        /* Input Area */
        .input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; align-items: center; }
        textarea { border-radius: 20px !important; resize: none; border: none; padding: 10px 15px !important; }
        
        /* Trace Area (Collapsible) */
        .trace-section { background: #fff; border-top: 1px solid #ccc; max-height: 250px; overflow-y: auto; display: none; }
        .step-card { border-right: 4px solid #007bff; margin: 10px; padding: 10px; background: #f8f9fa; font-size: 0.8rem; }
        pre { background: #2b2b2b; color: #fff; padding: 8px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="bg-primary text-white p-3 shadow-sm d-flex justify-content-between align-items-center">
        <h5 class="m-0">MindFulMate</h5>
        <button class="btn btn-outline-light btn-sm" onclick="toggleTrace()"> Trace</button>
    </div>

    <div id="chat-window">
        <div class="message agent">Hi, how are you feeling today?</div>
    </div>

    <div id="trace-section" class="trace-section p-3">
        <h6>Execution Trace :</h6>
        <div id="stepsContainer"></div>
    </div>

    <div class="input-area">
    <button class="btn btn-success rounded-circle" id="runBtn" onclick="runAgent()" style="width: 50px; height: 50px;">➔</button>
    <textarea class="form-control" id="userPrompt" rows="1" placeholder="Type a message..."></textarea>
    </div>

    <script>
        let chatHistory = [];

        function toggleTrace() {
            const ts = document.getElementById('trace-section');
            ts.style.display = (ts.style.display === 'none' || ts.style.display === '') ? 'block' : 'none';
        }

       async function runAgent() {
    const promptInput = document.getElementById('userPrompt');
    const prompt = promptInput.value.trim();
    const btn = document.getElementById('runBtn');
    const chatWindow = document.getElementById('chat-window');

    if (!prompt) return;

    appendBubble('user', prompt);
    promptInput.value = '';
    btn.disabled = true;

    const typingIndicator = document.createElement('div');
    typingIndicator.className = 'typing shadow-sm';
    typingIndicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    typingIndicator.id = 'loading-indicator';
    chatWindow.appendChild(typingIndicator);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    try {
        const response = await fetch('/api/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt: prompt,
                history: chatHistory.concat([{ role: "user", content: prompt }])
            })
        });

        const data = await response.json();

        document.getElementById('loading-indicator').remove();

        if (data.status === 'ok') {
            appendBubble('agent', data.response); 
            chatHistory.push({ role: "user", content: prompt });
            chatHistory.push({ role: "assistant", content: data.response });
            renderSteps(data.steps); 
        }
    } catch (err) {
        if (document.getElementById('loading-indicator')) document.getElementById('loading-indicator').remove();
        appendBubble('agent', "Error: Could not connect to the agent.");
    } finally {
        btn.disabled = false;
    }
}

        function appendBubble(role, text) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${role}`;
        
            const linkify = (rawText) => {
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                return rawText.replace(urlRegex, (url) => {
                    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
                });
            };
        
            const getYoutubeEmbed = (rawText) => {
                const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
                const match = rawText.match(ytRegex);
                if (match && match[1]) {
                    return `<div class="video-container">
                                <iframe src="https://www.youtube.com/embed/${match[1]}" frameborder="0" allowfullscreen></iframe>
                            </div>`;
                }
                return '';
            };
        
            div.innerHTML = linkify(text) + getYoutubeEmbed(text); 
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
        function renderSteps(steps) {
            const container = document.getElementById('stepsContainer');
            container.innerHTML = '';
            steps.forEach(step => {
                const card = document.createElement('div');
                card.className = 'step-card shadow-sm';
                card.innerHTML = `
                    <strong>Module: ${step.module}</strong> <br>
                    <small>Response:</small>
                    <pre>${typeof step.response === 'object' ? JSON.stringify(step.response, null, 2) : step.response}</pre>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
